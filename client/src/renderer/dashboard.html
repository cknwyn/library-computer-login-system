<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src http://localhost *;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Computer System — Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">📚</span>
      <div>
        <div class="topbar-title">Library Computer System</div>
        <div class="topbar-sub" id="terminal-code-display">—</div>
      </div>
    </div>
    <div class="topbar-center">
      <div class="session-timer" id="session-timer">00:00:00</div>
      <div class="session-timer-label">Session Duration</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-clock" id="topbar-clock">—</div>
      <button class="btn-logout" id="btn-logout">
        <span>Sign Out</span>
        <span class="logout-icon">🚪</span>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- User info card -->
    <div class="user-card" id="user-card">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name"  id="user-name">Loading…</div>
        <div class="user-meta">
          <span class="user-role-badge" id="user-role">—</span>
          <span class="user-id"   id="user-id-display">—</span>
          <span class="user-dept" id="user-dept">—</span>
        </div>
        <div class="user-login-info">
          Session started: <span id="login-time-display">—</span>
        </div>
      </div>
      <div class="heartbeat-indicator" id="heartbeat-dot" title="Heartbeat">
        <div class="heartbeat-pulse"></div>
        <span>Connected</span>
      </div>
    </div>

    <!-- Content grid -->
    <div class="content-grid">

      <!-- Installed Apps -->
      <section class="panel apps-panel">
        <div class="panel-header">
          <div class="panel-icon">🖥️</div>
          <h2 class="panel-title">Available Apps</h2>
        </div>
        <div class="apps-grid" id="apps-grid">
          <div class="loading-state">Loading apps…</div>
        </div>
      </section>

      <!-- Request Form -->
      <section class="panel request-panel">
        <div class="panel-header">
          <div class="panel-icon">📦</div>
          <h2 class="panel-title">Request App</h2>
        </div>
        <p class="panel-desc">Need an app that isn't listed? Request it from the librarian below.</p>

        <div id="req-success" class="req-alert req-success" style="display:none"></div>
        <div id="req-error"   class="req-alert req-error"   style="display:none"></div>

        <form id="request-form" novalidate>
          <div class="req-field">
            <label class="req-label">App Name *</label>
            <input id="req-app-name" type="text" class="req-input" placeholder="e.g. Adobe Photoshop" required>
          </div>
          <div class="req-field">
            <label class="req-label">Request Type</label>
            <div class="req-type-toggle">
              <button type="button" class="type-btn active" data-type="install">📥 Install</button>
              <button type="button" class="type-btn" data-type="uninstall">🗑 Uninstall</button>
            </div>
            <input type="hidden" id="req-type" value="install">
          </div>
          <div class="req-field">
            <label class="req-label">Reason (optional)</label>
            <textarea id="req-reason" class="req-input" rows="2" placeholder="Why do you need this app?"></textarea>
          </div>
          <button type="submit" class="btn-request">Submit Request</button>
        </form>

        <!-- My requests list -->
        <div id="my-requests-section" style="margin-top:24px;display:none">
          <div class="req-history-title">Your Requests This Session</div>
          <div id="my-requests-list"></div>
        </div>
      </section>

    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
